<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#1c1c1e" />
  <meta name="description" content="광고 없는 HWP/HWPX 뷰어. 파일 업로드 없이 브라우저 안에서 문서를 엽니다." />
  <title>한글 뷰어</title>
  <link rel="manifest" href="manifest.json?v=10" />
  <link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button class="btn icon" id="openBtn" aria-label="파일 열기">📂</button>
      <div id="titleWrap">
        <div id="title" class="placeholder">파일을 선택하세요</div>
        <div id="docMeta" hidden>
          <span id="docType">-</span>
          <span aria-hidden="true">·</span>
          <span id="docSize">-</span>
          <span aria-hidden="true">·</span>
          <span id="docPages">-</span>
        </div>
      </div>
      <button class="btn icon" id="themeBtn" aria-label="테마 전환" title="테마 전환">◐</button>
    </header>

    <div id="toolbar" hidden aria-label="문서 보기 도구">
      <div id="zoomControls">
        <button class="btn toolbtn" id="zoomOutBtn" aria-label="축소">－</button>
        <button class="btn toolbtn" id="zoomResetBtn" aria-label="배율 초기화">100%</button>
        <button class="btn toolbtn" id="zoomInBtn" aria-label="확대">＋</button>
        <span id="zoomLabel" aria-live="polite">100%</span>
      </div>
      <div id="searchControls">
        <input id="searchInput" type="search" inputmode="search" placeholder="문서에서 찾기" aria-label="문서에서 찾기" />
        <button class="btn toolbtn" id="searchPrevBtn" aria-label="이전 검색 결과">↑</button>
        <button class="btn toolbtn" id="searchNextBtn" aria-label="다음 검색 결과">↓</button>
        <span id="searchStatus" aria-live="polite">검색 전</span>
      </div>
    </div>

    <div id="errorBox" role="alert" aria-live="polite"></div>

    <main id="empty">
      <div class="icon" aria-hidden="true">📄</div>
      <p>HWP 또는 HWPX 파일을 열어 바로 확인하세요.<br />광고 없음 · 파일 업로드 없음 · 브라우저 안에서 처리</p>
      <div class="empty-actions">
        <button class="btn primary" id="openBtn2">파일 열기</button>
      </div>
      <p class="subtle">팁: 홈 화면에 추가하면 앱처럼 더 편하게 쓸 수 있습니다.</p>
    </main>

    <section id="viewer-wrap" hidden>
      <div id="page-container" aria-live="off"></div>
    </section>

    <nav id="bottombar" hidden aria-label="문서 탐색">
      <button class="navbtn" id="prevBtn" aria-label="이전 페이지">‹</button>
      <div id="pageMeta">
        <label class="page-jump-label" for="pageInput">페이지</label>
        <input id="pageInput" inputmode="numeric" pattern="[0-9]*" aria-label="페이지 번호 입력" />
        <span id="pageInfo">/ -</span>
      </div>
      <button class="navbtn" id="nextBtn" aria-label="다음 페이지">›</button>
    </nav>

    <div id="loading" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <div id="loadingText">문서를 여는 중…</div>
    </div>

    <input type="file" id="fileInput" accept=".hwp,.hwpx,application/x-hwp,application/haansofthwpx" />
  </div>

  <script type="module" src="./app.js?v=10"></script>
</body>
</html>
